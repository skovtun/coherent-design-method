<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Apple</title>
<meta name="description" content="Discover the innovative world of Apple and shop everything iPhone, iPad, Apple Watch, Mac, and Apple TV.">
<style>
  body {
    margin: 0;
    background-color: #ffffff;
    color: #1d1d1f;
    font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.47059;
    letter-spacing: -0.022em;
  }
  h1 { font-size: 96px; line-height: 1.05; font-weight: 600; letter-spacing: -0.015em; margin: 0 0 16px; color: #1d1d1f; }
  h2 { font-size: 56px; line-height: 1.07; font-weight: 600; letter-spacing: -0.005em; margin: 0 0 12px; }
  h3 { font-size: 32px; line-height: 1.125; font-weight: 600; margin: 0 0 12px; }
  p  { font-size: 21px; line-height: 1.4; margin: 0 0 12px; color: #1d1d1f; }
  a  { color: #0066cc; text-decoration: none; font-size: 17px; }
  .btn-primary {
    background-color: #0071e3;
    color: #ffffff;
    padding: 12px 22px;
    border: 0;
    border-radius: 980px;
    font-size: 17px;
    font-weight: 400;
    transition-duration: 200ms;
    transition-timing-function: cubic-bezier(.4, 0, .6, 1);
    transition-property: background-color;
  }
  .btn-secondary {
    background-color: transparent;
    color: #0071e3;
    padding: 12px 22px;
    border: 1px solid #0071e3;
    border-radius: 980px;
    font-size: 17px;
  }
  section.hero { padding: 80px 22px; background-color: #ffffff; max-width: 1024px; margin: 0 auto; text-align: center; }
  .card { padding: 40px; background-color: #fbfbfd; border-radius: 18px; max-width: 540px; }
  nav { padding: 0 22px; background-color: rgba(0,0,0,0.8); color: #f5f5f7; }
  footer { padding: 48px 22px; background-color: #f5f5f7; color: #6e6e73; }
  input { padding: 8px 12px; border-radius: 4px; border: 1px solid #d2d2d7; }
</style>
</head>
<body>
<nav><a href="#store">Store</a></nav>
<section class="hero">
  <h1>iPhone</h1>
  <p>Designed to be loved.</p>
  <button class="btn-primary">Buy</button>
  <button class="btn-secondary">Learn more</button>
  <a href="/iphone">Compare iPhone models</a>
  <input type="search" placeholder="Search apple.com">
  <svg width="16" height="16" viewBox="0 0 16 16"><path d="M0 0h16v16H0z" fill="#1d1d1f"/></svg>
</section>
<section>
  <h2>Magic at your fingertips</h2>
  <article class="card">
    <h3>The chip that changes everything</h3>
    <p>A revolutionary leap in efficiency.</p>
  </article>
</section>
<footer>
  <h3>Apple</h3>
  <a href="/legal">Legal</a>
</footer>
</body>
</html>
