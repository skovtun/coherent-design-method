name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Detect dist-tag from the release tag name (v0.13.0).
      # Pre-release tags (vX.Y.Z-rc.N, vX.Y.Z-beta.N, vX.Y.Z-alpha.N) publish to
      # the `next` dist-tag so they don't overwrite `latest`. Stable tags publish
      # to `latest` (default).
      #
      # Without this, every published version becomes `npm install -g @getcoherent/cli`
      # by default — including release candidates that should require explicit
      # `npm install -g @getcoherent/cli@next`. Adversarial review on the v0.13.0
      # plan (2026-04-27) caught that the original workflow had no dist-tag
      # detection — RC strategy was structurally impossible.
      - name: Detect dist-tag
        id: tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [[ "$TAG_NAME" =~ -(rc|beta|alpha)\.[0-9]+$ ]]; then
            echo "dist_tag=next" >> $GITHUB_OUTPUT
            echo "Pre-release tag detected ($TAG_NAME) — publishing to 'next' dist-tag"
          else
            echo "dist_tag=latest" >> $GITHUB_OUTPUT
            echo "Stable tag detected ($TAG_NAME) — publishing to 'latest' dist-tag"
          fi

      # Use `pnpm publish`, not `npm publish`. The packages declare
      # `workspace:*` deps; npm doesn't resolve that protocol and the
      # prepublishOnly guard hard-stops it. pnpm rewrites workspace:* into
      # the resolved version at pack time, so the published tarball has
      # real version specifiers and `npm install -g @getcoherent/cli`
      # works downstream.
      - name: Publish @getcoherent/core
        working-directory: ./packages/core
        run: pnpm publish --tag ${{ steps.tag.outputs.dist_tag }} --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @getcoherent/cli
        working-directory: ./packages/cli
        run: pnpm publish --tag ${{ steps.tag.outputs.dist_tag }} --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Promotion path documented for the operator: after RC validates,
      # promote to latest manually:
      #
      #   npm dist-tag add @getcoherent/core@X.Y.Z latest
      #   npm dist-tag add @getcoherent/cli@X.Y.Z latest
      #
      # Cannot automate without a separate workflow + manual approval gate.
