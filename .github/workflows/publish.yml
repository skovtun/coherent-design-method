name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Detect dist-tag from GitHub's release.prerelease boolean.
      #
      # The boolean is set when the release is created with `gh release create
      # --prerelease` OR ticked in the GitHub UI. This is the canonical signal
      # for "this is a pre-release" — failing closed: forgetting `--prerelease`
      # publishes to `latest`, which is at least the explicit operator intent.
      #
      # Pre-v0.13.0 part1 used a regex on the tag name (`^v.*-(rc|beta|alpha)\.[0-9]+$`).
      # DevEx review (2026-04-27) caught 4 bypass classes: uppercase RC, build
      # metadata (`+build.42`), nested pre-release (`-rc.1.2`), alternate labels
      # (`-pre.1`, `-canary.1`). Switched to the boolean flag. Tag-name
      # convention is no longer load-bearing — only the prerelease flag matters.
      - name: Detect dist-tag
        id: tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "dist_tag=next" >> $GITHUB_OUTPUT
            echo "Pre-release detected ($TAG_NAME, prerelease=$IS_PRERELEASE) — publishing to 'next' dist-tag"
          else
            echo "dist_tag=latest" >> $GITHUB_OUTPUT
            echo "Stable release detected ($TAG_NAME, prerelease=$IS_PRERELEASE) — publishing to 'latest' dist-tag"
          fi

      # Use `pnpm publish`, not `npm publish`. The packages declare
      # `workspace:*` deps; npm doesn't resolve that protocol and the
      # prepublishOnly guard hard-stops it. pnpm rewrites workspace:* into
      # the resolved version at pack time, so the published tarball has
      # real version specifiers and `npm install -g @getcoherent/cli`
      # works downstream.
      - name: Publish @getcoherent/core
        working-directory: ./packages/core
        run: pnpm publish --tag ${{ steps.tag.outputs.dist_tag }} --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @getcoherent/cli
        working-directory: ./packages/cli
        run: pnpm publish --tag ${{ steps.tag.outputs.dist_tag }} --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Surface promotion instructions in the GitHub Actions UI when an RC
      # was just published. DevEx review (2026-04-27) caught: documented as
      # comments only is invisible to the operator at release time. The
      # ::notice:: directive surfaces these in the run page summary.
      - name: Promotion instructions (RC only)
        if: steps.tag.outputs.dist_tag == 'next'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          # Strip leading `v` if present (npm dist-tag uses bare semver).
          VERSION="${VERSION#v}"
          echo "::notice title=RC published to 'next' — promotion required for 'latest'::"
          echo "::notice::Run AFTER manual canary validates:"
          echo "::notice::  npm dist-tag add @getcoherent/core@$VERSION latest"
          echo "::notice::  npm dist-tag add @getcoherent/cli@$VERSION latest"
          echo "::notice::Cannot automate — requires manual approval gate."
