name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Use `pnpm publish`, not `npm publish`. The packages declare
      # `workspace:*` deps; npm doesn't resolve that protocol and the
      # prepublishOnly guard hard-stops it. pnpm rewrites workspace:* into
      # the resolved version at pack time, so the published tarball has
      # real version specifiers and `npm install -g @getcoherent/cli`
      # works downstream.
      - name: Publish @getcoherent/core
        working-directory: ./packages/core
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @getcoherent/cli
        working-directory: ./packages/cli
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
